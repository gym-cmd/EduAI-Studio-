</a>

<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">home</span>

</button>

                        Check Answer
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>

<script>
function loadStoredJson(key) {
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e) { localStorage.removeItem(key); return null; }
}

var quizState = {
    questions: [],
    currentIndex: 0,
    answers: [],
    stepIndex: -1,
    stepTitle: '',
};

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

async function loadQuizData() {
    var curriculum = loadStoredJson('eduai.curriculum');
    var steps = (curriculum && Array.isArray(curriculum.steps)) ? curriculum.steps : [];
    var params = new URLSearchParams(window.location.search);
    var stepParam = parseInt(params.get('step'), 10);

    // Show step selector if no step param
    if (steps.length === 0) {
        document.getElementById('quiz-module-label').textContent = 'No curriculum found. Complete your assessment first.';
        document.getElementById('quiz-question').textContent = 'Please complete the assessment chat and generate a curriculum before taking a quiz.';
        document.getElementById('check-answer-btn').style.display = 'none';
        return;
    }

    if (isNaN(stepParam) || stepParam < 0 || stepParam >= steps.length) {
        // Show step picker
        showStepPicker(steps);
        return;
    }

    quizState.stepIndex = stepParam;
    quizState.stepTitle = steps[stepParam].title || 'Step ' + (stepParam + 1);
    document.getElementById('quiz-module-label').textContent = quizState.stepTitle;

    // Fetch questions from agent
    document.getElementById('quiz-question').textContent = 'Generating questions...';
    document.getElementById('quiz-options').innerHTML = '<div class="flex justify-center py-8"><div class="animate-spin size-10 border-4 border-primary border-t-transparent rounded-full"></div></div>';
    document.getElementById('check-answer-btn').style.display = 'none';

    try {
        var resp = await fetch('/api/quiz/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ step_title: steps[stepParam].title || '', step_overview: steps[stepParam].overview || '' })
        });
        if (!resp.ok) throw new Error('Failed to generate quiz');
        var data = await resp.json();
        if (!data.questions || data.questions.length === 0) throw new Error('No questions returned');
        quizState.questions = data.questions;
        quizState.currentIndex = 0;
        quizState.answers = [];
        document.getElementById('check-answer-btn').style.display = '';
        renderQuestion();
    } catch(e) {
        document.getElementById('quiz-question').textContent = 'Failed to generate quiz: ' + e.message;
        document.getElementById('quiz-options').innerHTML = '<a href="/chat" class="text-primary font-bold">Go to chat to ask the tutor</a>';
    }
}

function showStepPicker(steps) {
    document.getElementById('quiz-module-label').textContent = 'Pick a step to quiz on';
    document.getElementById('quiz-question').textContent = 'Choose which learning step you want to be quizzed on:';
    document.getElementById('check-answer-btn').style.display = 'none';
    var optionsContainer = document.getElementById('quiz-options');
    optionsContainer.innerHTML = '';
    var completed = loadStoredJson('eduai.stepsCompleted') || [];
    steps.forEach(function(step, i) {
        var isDone = completed.indexOf(i) !== -1;
        var btn = document.createElement('a');
        btn.href = '/quiz?step=' + i;
        btn.className = 'block p-5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all cursor-pointer';
        btn.innerHTML = '<div class="flex items-center gap-4">'
            + '<div class="size-10 rounded-xl flex items-center justify-center ' + (isDone ? 'bg-green-100 text-green-600' : 'bg-slate-100 dark:bg-slate-800 text-slate-400') + '">'
            + '<span class="material-symbols-outlined">' + (isDone ? 'check_circle' : 'quiz') + '</span></div>'
            + '<div><p class="font-bold">' + escapeHtml(step.title || 'Step ' + (i+1)) + '</p>'
            + '<p class="text-sm text-slate-500">' + (isDone ? 'Completed' : 'Not attempted') + '</p></div></div>';
        optionsContainer.appendChild(btn);
    });
}

function renderQuestion() {
    var currentQuestion = quizState.questions[quizState.currentIndex];
    document.getElementById('quiz-question').textContent = currentQuestion.question;
    document.getElementById('quiz-step-label').textContent = 'Question ' + (quizState.currentIndex + 1) + ' of ' + quizState.questions.length;
    document.getElementById('quiz-progress-fill').style.width = ((quizState.currentIndex + 1) / quizState.questions.length * 100) + '%';
    document.getElementById('quiz-feedback').textContent = '';

    var optionsContainer = document.getElementById('quiz-options');
    optionsContainer.innerHTML = currentQuestion.options.map(function(option, index) {
        return '<label class="block cursor-pointer group">'
            + '<input class="hidden peer" name="ai-quiz" type="radio" value="' + index + '"/>'
            + '<div class="p-5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:bg-primary/5 group-hover:border-slate-300 dark:group-hover:border-slate-700">'
            + '<div class="flex items-center gap-4">'
            + '<div class="radio-dot size-6 rounded-full border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center">'
            + '<div class="radio-inner size-2 bg-white rounded-full opacity-0"></div></div>'
            + '<p class="text-slate-700 dark:text-slate-200 font-medium">' + escapeHtml(option) + '</p>'
            + '</div></div></label>';
    }).join('');
}

async function checkAnswer() {
    var selected = document.querySelector('input[name="ai-quiz"]:checked');
    if (!selected) {
        alert('Please select an answer first.');
        return;
    }

    var selectedIndex = Number(selected.value);
    var currentQuestion = quizState.questions[quizState.currentIndex];
    quizState.answers.push(selectedIndex);

    if (quizState.currentIndex < quizState.questions.length - 1) {
        quizState.currentIndex += 1;
        renderQuestion();
        return;
    }

    // All questions answered — send to agent for evaluation
    document.getElementById('quiz-question').textContent = 'Evaluating your answers...';
    document.getElementById('quiz-options').innerHTML = '<div class="flex justify-center py-8"><div class="animate-spin size-10 border-4 border-primary border-t-transparent rounded-full"></div></div>';
    document.getElementById('check-answer-btn').style.display = 'none';
    document.getElementById('quiz-feedback').textContent = '';

    try {
        var resp = await fetch('/api/quiz/evaluate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ questions: quizState.questions, answers: quizState.answers })
        });
        if (!resp.ok) throw new Error('Evaluation failed');
        var result = await resp.json();

        // Store result
        var quizResult = {
            stepIndex: quizState.stepIndex,
            score: result.score || 0,
            total: result.total || quizState.questions.length,
            passed: !!result.passed,
            revision_hint: result.revision_hint || '',
            feedback: result.feedback || '',
            answers: quizState.questions.map(function(q, i) {
                return { question: q.question, selectedIndex: quizState.answers[i], selectedText: q.options[quizState.answers[i]] || '' };
            }),
            timestamp: Date.now()
        };
        localStorage.setItem('eduai.quizResult', JSON.stringify(quizResult));

        // Update progress if passed
        if (quizResult.passed && quizState.stepIndex >= 0) {
            var completed = loadStoredJson('eduai.stepsCompleted') || [];
            if (completed.indexOf(quizState.stepIndex) === -1) {
                completed.push(quizState.stepIndex);
                localStorage.setItem('eduai.stepsCompleted', JSON.stringify(completed));
            }
            var progress = loadStoredJson('eduai.progress') || { lessonsCompleted:0, totalLessons:0, quizzesPassed:0, quizzesFailed:0 };
            progress.quizzesPassed = (progress.quizzesPassed || 0) + 1;
            progress.lessonsCompleted = completed.length;
            localStorage.setItem('eduai.progress', JSON.stringify(progress));
        } else {
            var progress = loadStoredJson('eduai.progress') || { lessonsCompleted:0, totalLessons:0, quizzesPassed:0, quizzesFailed:0 };
            progress.quizzesFailed = (progress.quizzesFailed || 0) + 1;
            localStorage.setItem('eduai.progress', JSON.stringify(progress));
        }

        // Update quiz history
        var history = loadStoredJson('eduai.quizHistory') || [];
        history.push({ stepIndex: quizState.stepIndex, score: quizResult.score, total: quizResult.total, passed: quizResult.passed, timestamp: Date.now() });
        localStorage.setItem('eduai.quizHistory', JSON.stringify(history));

        window.location.href = '/quiz-results';
    } catch(e) {
        document.getElementById('quiz-question').textContent = 'Failed to evaluate: ' + e.message;
        document.getElementById('quiz-options').innerHTML = '<a href="/quiz?step=' + quizState.stepIndex + '" class="text-primary font-bold">Try again</a>';
    }
}

loadQuizData();
</script>
<div style="position:fixed;bottom:1.5rem;left:1.5rem;z-index:9999"><button onclick="cycleTheme()" class="flex items-center gap-2 px-3 py-2.5 rounded-full bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-slate-200 dark:border-slate-700 shadow-lg hover:shadow-xl transition-all text-slate-600 dark:text-slate-300" title="Toggle theme"><span id="theme-icon" class="material-symbols-outlined text-lg">light_mode</span><span id="theme-label" class="text-xs font-medium">Light</span></button></div>
<script>
function cycleTheme(){var m=['light','dark','system'],c=localStorage.getItem('theme')||'light',n=m[(m.indexOf(c)+1)%3];localStorage.setItem('theme',n);applyTheme(n)}
function applyTheme(t){var d=document.documentElement,dk=t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme:dark)').matches);d.classList.toggle('dark',dk);d.classList.toggle('light',!dk);updateThemeIcon(t)}
function updateThemeIcon(t){var i=document.getElementById('theme-icon'),l=document.getElementById('theme-label');if(i)i.textContent=t==='dark'?'dark_mode':t==='system'?'monitor':'light_mode';if(l)l.textContent=t==='dark'?'Dark':t==='system'?'System':'Light'}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){if(localStorage.getItem('theme')==='system')applyTheme('system')});updateThemeIcon(localStorage.getItem('theme')||'light');
</script>
</body></html>
